name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ dev, docker_cicd, main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/olivetti-face-recognizer

jobs:
  # ── Job 1: Model Training & Testing ───────────────────────────────────────────
  check_working_repo:
    name: Train & Evaluate Model
    runs-on: ubuntu-latest

    steps:
      - name: ① Checkout repository
        uses: actions/checkout@v4

      - name: ② Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: ③ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ④ Train model (generates savedmodel.pth)
        run: python train.py

      - name: ⑤ Evaluate model (display test accuracy)
        run: python test.py

  # ── Job 2: Build & Push Docker Image (docker_cicd branch only) ───────────────
  build_and_push_docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: check_working_repo
    if: github.ref == 'refs/heads/docker_cicd'

    steps:
      - name: ① Checkout repository
        uses: actions/checkout@v4

      - name: ② Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ③ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ④ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: ⑤ Verify image pushed
        run: |
          echo "Image pushed successfully:"
          echo "  ${{ env.DOCKER_IMAGE }}:latest"
          echo "  ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"